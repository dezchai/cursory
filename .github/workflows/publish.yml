name: Publish to npm

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish.yml"
      - "bun.lock"
      - "data/**"
      - "package.json"
      - "README.md"
      - "src/**"
      - "tsconfig.json"
      - "tsconfig.build.json"
  workflow_dispatch:

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      current_version: ${{ steps.compare.outputs.current_version }}
      package_version: ${{ steps.compare.outputs.package_version }}
      should_publish: ${{ steps.compare.outputs.should_publish }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Compare package version with npm
        id: compare
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          CURRENT_VERSION="$(npm view @dezchai/cursory version 2>/dev/null || true)"

          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"

          if [ "$PACKAGE_VERSION" = "$CURRENT_VERSION" ]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "Version $PACKAGE_VERSION is already published. Skipping publish."
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "Publishing version $PACKAGE_VERSION. Current npm version: ${CURRENT_VERSION:-<none>}"
          fi

  publish:
    needs: check-version
    if: needs.check-version.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/@dezchai/cursory
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Publish package
        run: npm publish --access public
